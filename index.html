<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1st Year Practice</title>
  <style>
    :root {
      --bg-1: #eef6ff;
      --bg-2: #fff7e8;
      --ink: #1f2a44;
      --muted: #64748b;
      --card: rgba(255, 255, 255, 0.88);
      --line: rgba(148, 163, 184, 0.35);
      --shadow: 0 20px 50px rgba(31, 42, 68, 0.16);
      --shadow-soft: 0 12px 26px rgba(31, 42, 68, 0.10);
      --blue: #2563eb;
      --purple: #7c3aed;
      --orange: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.20), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.22), transparent 30rem),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      justify-content: center;
      padding: 40px 18px;
      line-height: 1.6;
    }

    .page {
      width: min(100%, 980px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 32px;
      padding: 34px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      opacity: 0.55;
      pointer-events: none;
    }

    .hero::before {
      width: 210px;
      height: 210px;
      right: -70px;
      top: -80px;
      background: linear-gradient(135deg, #bfdbfe, #c4b5fd);
    }

    .hero::after {
      width: 150px;
      height: 150px;
      left: -58px;
      bottom: -74px;
      background: linear-gradient(135deg, #fed7aa, #fde68a);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.10);
      color: #1d4ed8;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 1.08;
      letter-spacing: -0.055em;
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 28px;
    }

    .card {
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--card);
      box-shadow: var(--shadow-soft);
      text-decoration: none;
      color: inherit;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-5px);
      box-shadow: 0 20px 38px rgba(31, 42, 68, 0.16);
      border-color: rgba(37, 99, 235, 0.35);
      outline: none;
    }

    .icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      color: white;
      font-size: 1.7rem;
      font-weight: 900;
      box-shadow: inset 0 -10px 22px rgba(0, 0, 0, 0.16);
    }

    .match .icon {
      background: linear-gradient(135deg, var(--blue), #38bdf8);
    }

    .flashcards .icon {
      background: linear-gradient(135deg, var(--purple), #ec4899);
    }

    .writing .icon {
      background: linear-gradient(135deg, var(--orange), #facc15);
    }

    .card h2 {
      margin: 18px 0 0;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    @media (max-width: 800px) {
      body {
        padding: 22px 12px;
      }

      .hero {
        padding: 24px;
        border-radius: 26px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 150px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <div class="hero-content">
        <div class="eyebrow">英単語リンク集</div>
        <h1 id="page-title">1st Year Practice</h1>

        <div class="grid" aria-label="練習メニュー">
          <a class="card match" href="https://quizlet.com/1178926051/match" target="_blank" rel="noopener">
            <div>
              <div class="icon" aria-hidden="true">↔</div>
              <h2>Match Game</h2>
            </div>
          </a>

          <a class="card flashcards" href="https://quizlet.com/1178926051/flashcards" target="_blank" rel="noopener">
            <div>
              <div class="icon" aria-hidden="true">★</div>
              <h2>Flash card</h2>
            </div>
          </a>

          <a class="card writing" href="https://vexavi.github.io/1nenseiwritingdrill/" target="_blank" rel="noopener">
            <div>
              <div class="icon" aria-hidden="true">✎</div>
              <h2>Writing Practice</h2>
            </div>
          </a>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
